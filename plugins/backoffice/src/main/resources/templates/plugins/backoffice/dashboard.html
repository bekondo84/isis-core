<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Test - Plugin</title>
    <link rel="stylesheet" th:href="@{/plugins-assets/backoffice/css/style.css}">
</head>
<body>

<div class="card-plugin" style="text-align: center;">

    <div style="margin-bottom: 20px;">
        <img th:src="@{/plugins-assets/backoffice/images/logo.svg}"
             alt="Logo du Plugin"
             style="width: 80px; height: 80px; animation: pulse 2s infinite;" />
    </div>

    <h1 class="titre-plugin">Interface de Test Modulaire</h1>
    <p class="status-badge">Plugin ID : Admin-Plugin (Actif)</p>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <p>Message du Core : <strong th:text="${message}">Texte de secours</strong></p>

    <p>Si le logo circulaire apparaît juste au-dessus, ton moteur de <strong>gestion des images</strong> est parfaitement opérationnel !</p>

    <button id="btn-test">Tester le JavaScript</button>
</div>

<script th:src="@{/plugins-assets/backoffice/js/main.js}"></script>
</body>
</html>
